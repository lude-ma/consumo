version: "3.8"

# Prod ports: Web 8100 | Grafana 3000 | InfluxDB 8086 | API internal only
services:
  influxdb:
    container_name: consumo-prod-influxdb
    ports:
      - "8086:8086"
    deploy:
      resources:
        limits:
          memory: 512m

  grafana:
    container_name: consumo-prod-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:3000

  api:
    container_name: consumo-prod-api
    # Not exposed externally - only reachable by web and grafana inside consumo-net
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    container_name: consumo-prod-web
    ports:
      - "8100:8100"
    deploy:
      resources:
        limits:
          memory: 256m
